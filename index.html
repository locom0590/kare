<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Gaze Game - Safari Calibrated</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        /* Başlatma Ekranı */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #fff;
        }
        #start-btn {
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            background: #25d366;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,250,0,0.3);
        }

        /* VR Düzeni */
        #vr-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            visibility: hidden;
        }
        .eye-view {
            position: relative;
            width: 50vw;
            height: 100vh;
            overflow: hidden;
            background: #1a1a1a;
        }
        #left-eye {
            border-right: 2px solid #000;
        }

        /* Sabit Crosshair */
        .crosshair-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            z-index: 100;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .crosshair-dot {
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
        }
        .crosshair-circle {
            width: 30px;
            height: 30px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            transition: transform 0.1s linear, border-color 0.2s;
        }
        .crosshair-circle.charging {
            transform: scale(0.4);
            border-color: #ffeb3b;
        }

        /* Hareketli Dünya */
        .scene {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 30px 10px;
            will-change: transform;
        }

        /* Matris Yapısı */
        .matrix-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            width: 110px;
            height: 110px;
            border: 3px solid #fff;
            background: #333;
            border-radius: 6px;
            overflow: hidden;
        }
        .sub-square {
            width: 100%;
            height: 100%;
            border: 1px solid rgba(0, 0, 0, 0.25);
        }

        .reference-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .level-text {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
        }

        .options-zone {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 100%;
        }
        .option-wrapper {
            position: relative;
        }

        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 52px;
            font-weight: bold;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.15s ease;
            pointer-events: none;
        }
        .feedback-overlay.wrong {
            background: rgba(255, 0, 0, 0.75);
            color: #fff;
            opacity: 1;
        }
        .feedback-overlay.correct {
            background: rgba(0, 255, 0, 0.75);
            color: #fff;
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h2 style="margin-bottom: 15px; text-align: center;">VR Gaze Matching Game</h2>
        <p style="margin-bottom: 25px; color: #ccc; text-align: center; max-width: 85%; font-size: 14px;">
            Lütfen cihazınızı <b>YATAY (Landscape)</b> konuma getirin ve ardından başlat butonuna basın.
        </p>
        <button id="start-btn">BAŞLAT</button>
    </div>

    <div id="vr-container">
        <div class="eye-view" id="left-eye">
            <div class="crosshair-container" id="left-crosshair-anchor">
                <div class="crosshair-dot"></div>
                <div class="crosshair-circle" id="left-circle"></div>
            </div>
            <div class="scene" id="left-scene"></div>
        </div>

        <div class="eye-view" id="right-eye">
            <div class="crosshair-container" id="right-crosshair-anchor">
                <div class="crosshair-dot"></div>
                <div class="crosshair-circle" id="right-circle"></div>
            </div>
            <div class="scene" id="right-scene"></div>
        </div>
    </div>

    <script>
        // --- Oyun Durumu ---
        let gameState = {
            level: 1,
            colors: ['red', 'green'],
            referenceMatrix: [],
            options: [],
            correctIndex: -1,
            wrongSelections: [false, false, false],
            isRoundTransitioning: false
        };

        // --- Safari İçin Optimize Edilmiş Filtre Motoru ---
        let currentX = 0, currentY = 0;   
        let targetX = 0, targetY = 0;     
        
        // Sarsıntıyı engellemek için filtreyi daha da derinleştirdik (0.12 -> 0.07)
        const LERP_FACTOR = 0.07; 
        const CLAMP_VAL = 100;     

        let lastBeta = null;
        let lastGamma = null;

        // --- Gaze Kontrolü ---
        let gazeTargetIndex = -1;
        let gazeTimer = null;
        const GAZE_DURATION = 1000; 

        // --- Web Audio API Sentezleyici ---
        let audioCtx = null;
        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(783.99, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'wrong') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(130.81, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(90, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.25);
            }
        }

        // --- Başlatıcı ve İzin Mekanizması ---
        const startBtn = document.getElementById('start-btn');
        const startOverlay = document.getElementById('start-overlay');
        const vrContainer = document.getElementById('vr-container');

        startBtn.addEventListener('click', () => {
            initAudio();
            initLevelPool();
            generateLevel();

            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            }

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleSafariCalibratedOrientation, true);
                        } else {
                            alert('Sensör izni reddedildi.');
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('deviceorientation', handleSafariCalibratedOrientation, true);
            }

            startOverlay.style.display = 'none';
            vrContainer.style.visibility = 'visible';
            requestAnimationFrame(updateSceneLoop);
        });

        // --- Safari Uyumlu Eksen ve Yön Koruyucu Motor ---
        function handleSafariCalibratedOrientation(event) {
            let beta = event.beta;   
            let gamma = event.gamma; 

            if (beta === null || gamma === null) return;

            if (lastBeta === null || lastGamma === null) {
                lastBeta = beta;
                lastGamma = gamma;
                return;
            }

            // Anlık değişim miktarı (Delta)
            let dBeta = beta - lastBeta;
            let dGamma = gamma - lastGamma;

            // Safari trigonometrik kırılma koruması (Aşırı sıçramaları yakalayıp nötrleme)
            if (Math.abs(dBeta) > 100) dBeta = 0;
            if (Math.abs(dGamma) > 50) dGamma = 0;

            let orientationAngle = window.orientation || (screen.orientation && screen.orientation.angle) || 0;

            // Hassasiyeti çarpanı düşürüldü (4.5 -> 1.8) ve yön kilitlendi
            const SENSITIVITY = 1.8; 

            if (orientationAngle === 90) {
                // Sağ yatay tutuşta Safari eksen eşlemesi
                targetX += dBeta * SENSITIVITY;
                targetY += dGamma * SENSITIVITY;
            } else if (orientationAngle === -90 || orientationAngle === 270) {
                // Sol yatay tutuşta Safari eksen eşlemesi
                targetX -= dBeta * SENSITIVITY;
                targetY -= dGamma * SENSITIVITY;
            } else {
                targetX += dGamma * SENSITIVITY;
                targetY += dBeta * SENSITIVITY;
            }

            // Küplerin ekrandan kaçma sınır kontrolü
            targetX = Math.max(-CLAMP_VAL, Math.min(CLAMP_VAL, targetX));
            targetY = Math.max(-CLAMP_VAL, Math.min(CLAMP_VAL, targetY));

            lastBeta = beta;
            lastGamma = gamma;
        }

        // --- Akıcı Render Döngüsü ---
        function updateSceneLoop() {
            currentX += (targetX - currentX) * LERP_FACTOR;
            currentY += (targetY - currentY) * LERP_FACTOR;

            const leftScene = document.getElementById('left-scene');
            const rightScene = document.getElementById('right-scene');

            if (leftScene && rightScene) {
                // Kafayı sağa çevirince dünya sola gitmeli (Doğal VR Etkisi)
                const transformStr = `translate(${-currentX}px, ${-currentY}px)`;
                leftScene.style.transform = transformStr;
                rightScene.style.transform = transformStr;
            }

            checkGazeRaycast();
            requestAnimationFrame(updateSceneLoop);
        }

        // --- Geliştirilmiş Dinamik Raycast Motoru (Seçim Problemi Çözümü) ---
        function checkGazeRaycast() {
            if (gameState.isRoundTransitioning) return;

            // İmleçlerin ekrandaki güncel fiziksel merkez noktaları
            const leftAnchor = document.getElementById('left-crosshair-anchor').getBoundingClientRect();
            const rightAnchor = document.getElementById('right-crosshair-anchor').getBoundingClientRect();

            const leftOptions = document.querySelectorAll('#left-scene .option-wrapper');
            const rightOptions = document.querySelectorAll('#right-scene .option-wrapper');

            let detectedIndex = -1;
            
            // Çarpışma hassasiyeti için tolerans payı (piksel genişletme)
            const TOLERANCE = 5;

            // Sol göz taraması
            leftOptions.forEach(el => {
                const rect = el.getBoundingClientRect();
                if (leftAnchor.left + 20 >= (rect.left - TOLERANCE) && leftAnchor.left - 20 <= (rect.right + TOLERANCE) &&
                    leftAnchor.top + 20 >= (rect.top - TOLERANCE) && leftAnchor.top - 20 <= (rect.bottom + TOLERANCE)) {
                    detectedIndex = parseInt(el.getAttribute('data-index'));
                }
            });

            // Sağ göz taraması
            if (detectedIndex === -1) {
                rightOptions.forEach(el => {
                    const rect = el.getBoundingClientRect();
                    if (rightAnchor.left + 20 >= (rect.left - TOLERANCE) && rightAnchor.left - 20 <= (rect.right + TOLERANCE) &&
                        rightAnchor.top + 20 >= (rect.top - TOLERANCE) && rightAnchor.top - 20 <= (rect.bottom + TOLERANCE)) {
                        detectedIndex = parseInt(el.getAttribute('data-index'));
                    }
                });
            }

            if (detectedIndex !== -1 && !gameState.wrongSelections[detectedIndex]) {
                if (gazeTargetIndex !== detectedIndex) {
                    gazeTargetIndex = detectedIndex;
                    startGazeCharging();
                }
            } else {
                if (gazeTargetIndex !== -1) {
                    gazeTargetIndex = -1;
                    cancelGazeCharging();
                }
            }
        }

        // --- Gaze Zamanlayıcıları ---
        function startGazeCharging() {
            if (gazeTimer) clearTimeout(gazeTimer);

            document.getElementById('left-circle').classList.add('charging');
            document.getElementById('right-circle').classList.add('charging');

            gazeTimer = setTimeout(() => {
                evaluateSelection(gazeTargetIndex);
            }, GAZE_DURATION);
        }

        function cancelGazeCharging() {
            if (gazeTimer) {
                clearTimeout(gazeTimer);
                gazeTimer = null;
            }
            document.getElementById('left-circle').classList.remove('charging');
            document.getElementById('right-circle').classList.remove('charging');
        }

        // --- Oyun Akış Yönetimi ---
        function initLevelPool() {
            if (gameState.level <= 5) {
                gameState.colors = ['red', 'green'];
            } else if (gameState.level <= 10) {
                gameState.colors = ['red', 'green', 'yellow'];
            } else {
                gameState.colors = ['red', 'green', 'yellow', 'blue'];
            }
        }

        function generateRandomMatrix() {
            let matrix = [];
            for (let i = 0; i < 4; i++) {
                const idx = Math.floor(Math.random() * gameState.colors.length);
                matrix.push(gameState.colors[idx]);
            }
            return matrix;
        }

        function isMatricesEqual(m1, m2) {
            return m1.every((v, i) => v === m2[i]);
        }

        function generateLevel() {
            initLevelPool();
            gameState.wrongSelections = [false, false, false];
            gameState.isRoundTransitioning = false;
            cancelGazeCharging();

            gameState.referenceMatrix = generateRandomMatrix();
            gameState.correctIndex = Math.floor(Math.random() * 3);

            gameState.options = [];
            for (let i = 0; i < 3; i++) {
                if (i === gameState.correctIndex) {
                    gameState.options.push([...gameState.referenceMatrix]);
                } else {
                    let wrongMatrix;
                    do {
                        wrongMatrix = generateRandomMatrix();
                    } while (isMatricesEqual(wrongMatrix, gameState.referenceMatrix));
                    gameState.options.push(wrongMatrix);
                }
            }

            renderDOMInsideEye('left-scene');
            renderDOMInsideEye('right-scene');
        }

        function renderDOMInsideEye(sceneId) {
            const sceneEl = document.getElementById(sceneId);
            sceneEl.innerHTML = '';

            const refZone = document.createElement('div');
            refZone.className = 'reference-zone';
            
            const lvlText = document.createElement('div');
            lvlText.className = 'level-text';
            lvlText.innerText = `SEVİYE: ${gameState.level}`;
            refZone.appendChild(lvlText);

            const refMatrixEl = createMatrixDOM(gameState.referenceMatrix);
            refZone.appendChild(refMatrixEl);
            sceneEl.appendChild(refZone);

            const optionsZone = document.createElement('div');
            optionsZone.className = 'options-zone';

            gameState.options.forEach((matrixData, idx) => {
                const optWrapper = document.createElement('div');
                optWrapper.className = 'option-wrapper';
                optWrapper.setAttribute('data-index', idx);

                const matrixEl = createMatrixDOM(matrixData);
                optWrapper.appendChild(matrixEl);

                const feedbackOverlay = document.createElement('div');
                feedbackOverlay.className = 'feedback-overlay';
                if (gameState.wrongSelections[idx]) {
                    feedbackOverlay.classList.add('wrong');
                    feedbackOverlay.innerHTML = '&#10006;';
                } else if (gameState.isRoundTransitioning && idx === gameState.correctIndex) {
                    feedbackOverlay.classList.add('correct');
                    feedbackOverlay.innerHTML = '&#10004;';
                }
                optWrapper.appendChild(feedbackOverlay);

                optionsZone.appendChild(optWrapper);
            });

            sceneEl.appendChild(optionsZone);
        }

        function createMatrixDOM(matrixColors) {
            const container = document.createElement('div');
            container.className = 'matrix-container';
            matrixColors.forEach(color => {
                const subSquare = document.createElement('div');
                subSquare.className = 'sub-square';
                subSquare.style.backgroundColor = color;
                container.appendChild(subSquare);
            });
            return container;
        }

        function evaluateSelection(index) {
            gazeTargetIndex = -1;
            cancelGazeCharging();

            if (index === gameState.correctIndex) {
                gameState.isRoundTransitioning = true;
                playSound('correct');
                renderAllEyes();

                setTimeout(() => {
                    gameState.level++;
                    generateLevel();
                }, 1500);
            } else {
                if (!gameState.wrongSelections[index]) {
                    gameState.wrongSelections[index] = true;
                    playSound('wrong');
                    renderAllEyes();
                }
            }
        }

        function renderAllEyes() {
            renderDOMInsideEye('left-scene');
            renderDOMInsideEye('right-scene');
        }

        window.addEventListener('resize', () => {
            lastBeta = null;
            lastGamma = null;
        });
    </script>
</body>
</html>
