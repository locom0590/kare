<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jiroskop Renk Eşleştirme Oyunu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
            height: 100vh;
            width: 100vw;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            pointer-events: none; /* Tıklamaları engellemez, imleç arkadan akar */
            z-index: 2;
        }

        #score-board {
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            pointer-events: auto;
        }

        /* Seçenekler Alanı */
        #options-container {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 500px;
            margin-bottom: 30px;
            padding: 0 10px;
            box-sizing: border-box;
            pointer-events: auto;
        }

        .option-card {
            width: 28%;
            aspect-ratio: 1;
            border: 4px solid #444;
            border-radius: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            overflow: hidden;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        /* Tüm Ekranı Kaplayan Canvas */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* İzin ve Başlangıç Ekranı */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="score-board">Skor: <span id="score">0</span></div>
        
        <div id="options-container">
            <div class="option-card" id="opt0"></div>
            <div class="option-card" id="opt1"></div>
            <div class="option-card" id="opt2"></div>
        </div>
    </div>

    <div id="start-overlay">
        <h2>Jiroskop Eşleştirme Oyunu</h2>
        <p>Oyunu oynamak için telefonunuzu eğmeniz gerekir. Lütfen jiroskop izni verin ve cihazı tepsi gibi düz tutun.</p>
        <button id="start-btn">OYUNA BAŞLA</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const startOverlay = document.getElementById('start-overlay');
        const startBtn = document.getElementById('start-btn');

        // Ekran boyutlarını ayarla
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Renk Havuzu
        const colors = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33F3', '#33FFF0'];

        // Oyun Durumu
        let score = 0;
        let targetColors = [];
        let optionsData = [];
        let correctOptionIndex = 0;

        // İmleç Fizikleri
        let cursor = {
            x: window.innerWidth / 2,
            y: window.innerHeight / 2,
            radius: 12,
            vx: 0,
            vy: 0,
            speedMultiplier: 0.7, 
            friction: 0.92        
        };

        // Zamanlayıcı Kontrolleri
        let hoveredOptionIndex = -1;
        let hoverStartTime = null;
        const requiredHoverTime = 1000; 

        // İzin İşlemleri
        startBtn.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        initGame();
                    } else {
                        alert('Jiroskop izni reddedildi.');
                    }
                } catch (error) {
                    console.error(error);
                }
            } else {
                initGame();
            }
        });

        function initGame() {
            startOverlay.style.display = 'none';
            window.addEventListener('deviceorientation', handleOrientation);
            generateNewRound();
            requestAnimationFrame(gameLoop);
        }

        function handleOrientation(event) {
            let tiltX = event.gamma; 
            let tiltY = event.beta; // Tam tepsi modu (0 kalibrasyon)

            cursor.vx += tiltX * cursor.speedMultiplier * 0.1;
            cursor.vy += tiltY * cursor.speedMultiplier * 0.1;
        }

        function getRandomColors() {
            let roundColors = [];
            for(let i=0; i<4; i++) {
                roundColors.push(colors[Math.floor(Math.random() * colors.length)]);
            }
            return roundColors;
        }

        function generateNewRound() {
            targetColors = getRandomColors();
            correctOptionIndex = Math.floor(Math.random() * 3);
            optionsData = [];

            for (let i = 0; i < 3; i++) {
                if (i === correctOptionIndex) {
                    optionsData.push([...targetColors]);
                } else {
                    let wrongColors = getRandomColors();
                    while(JSON.stringify(wrongColors) === JSON.stringify(targetColors)) {
                        wrongColors = getRandomColors();
                    }
                    optionsData.push(wrongColors);
                }
            }

            for (let i = 0; i < 3; i++) {
                const card = document.getElementById(`opt${i}`);
                card.innerHTML = '';
                card.style.borderColor = '#444';
                
                optionsData[i].forEach(color => {
                    const div = document.createElement('div');
                    div.style.backgroundColor = color;
                    card.appendChild(div);
                });
            }

            cursor.x = canvas.width / 2;
            cursor.y = canvas.height / 2;
            cursor.vx = 0;
            cursor.vy = 0;
            hoveredOptionIndex = -1;
            hoverStartTime = null;
        }

        // Çarpışma Testi (DOM Elemanlarının gerçek konumuna göre dinamik algılama)
        function checkCollision() {
            let insideAnyZone = false;

            for (let i = 0; i < 3; i++) {
                const card = document.getElementById(`opt${i}`);
                const rect = card.getBoundingClientRect();

                // İmleç HTML kartının sınırları içinde mi?
                if (cursor.x >= rect.left && cursor.x <= rect.right &&
                    cursor.y >= rect.top && cursor.y <= rect.bottom) {
                    
                    insideAnyZone = true;

                    if (hoveredOptionIndex !== i) {
                        hoveredOptionIndex = i;
                        hoverStartTime = Date.now();
                    } else {
                        let elapsed = Date.now() - hoverStartTime;
                        card.style.borderColor = '#f1c40f';

                        if (elapsed >= requiredHoverTime) {
                            processSelection(i);
                        }
                    }
                    break;
                }
            }

            if (!insideAnyZone) {
                if (hoveredOptionIndex !== -1) {
                    document.getElementById(`opt${hoveredOptionIndex}`).style.borderColor = '#444';
                }
                hoveredOptionIndex = -1;
                hoverStartTime = null;
            }
        }

        function processSelection(selectedIndex) {
            if (selectedIndex === correctOptionIndex) {
                score++;
                scoreEl.innerText = score;
                document.getElementById(`opt${selectedIndex}`).style.borderColor = '#2ecc71';
            } else {
                document.getElementById(`opt${selectedIndex}`).style.borderColor = '#e74c3c';
                if(score > 0) score--;
                scoreEl.innerText = score;
            }

            setTimeout(() => {
                generateNewRound();
            }, 300);
        }

        // Ana Döngü
        function gameLoop() {
            cursor.vx *= cursor.friction;
            cursor.vy *= cursor.friction;
            cursor.x += cursor.vx;
            cursor.y += cursor.vy;

            // Sadece ekranın en dış sınırları korundu (Dışarı kaçmasın diye)
            if (cursor.x - cursor.radius < 0) { cursor.x = cursor.radius; cursor.vx = 0; }
            if (cursor.x + cursor.radius > canvas.width) { cursor.x = canvas.width - cursor.radius; cursor.vx = 0; }
            if (cursor.y - cursor.radius < 0) { cursor.y = cursor.radius; cursor.vy = 0; }
            if (cursor.y + cursor.radius > canvas.height) { cursor.y = canvas.height - cursor.radius; cursor.vy = 0; }

            checkCollision();

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Üstteki Büyük Kareyi Çiz
            const size = 180;
            const startX = (canvas.width - size) / 2;
            const startY = 100; // Skor tabelasının altına hizalandı

            if (targetColors.length === 4) {
                ctx.fillStyle = targetColors[0];
                ctx.fillRect(startX, startY, size/2, size/2);
                ctx.fillStyle = targetColors[1];
                ctx.fillRect(startX + size/2, startY, size/2, size/2);
                ctx.fillStyle = targetColors[2];
                ctx.fillRect(startX, startY + size/2, size/2, size/2);
                ctx.fillStyle = targetColors[3];
                ctx.fillRect(startX + size/2, startY + size/2, size/2, size/2);
            }

            // Ortadaki Artı Çizgisi
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(startX + size/2, startY);
            ctx.lineTo(startX + size/2, startY + size);
            ctx.moveTo(startX, startY + size/2);
            ctx.lineTo(startX + size, startY + size/2);
            ctx.stroke();

            // İmleci Çiz
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ffffff';
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(cursor.x, cursor.y, cursor.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Hover Efekti (Halka)
            if (hoveredOptionIndex !== -1 && hoverStartTime !== null) {
                let elapsed = Date.now() - hoverStartTime;
                let angle = (elapsed / requiredHoverTime) * Math.PI * 2;
                
                ctx.strokeStyle = '#f1c40f';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(cursor.x, cursor.y, cursor.radius + 6, -Math.PI/2, (-Math.PI/2) + angle);
                ctx.stroke();
            }

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
