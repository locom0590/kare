<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jiroskop Renk Eşleştirme Oyunu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        #score-board {
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
        }

        /* Oyun Alanı (Canvas) */
        canvas {
            background-color: #222;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 15px;
            max-width: 90vw;
            max-height: 45vh;
        }

        /* Seçenekler Alanı */
        #options-container {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 500px;
            margin-bottom: 30px;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .option-card {
            width: 28%;
            aspect-ratio: 1;
            border: 4px solid #444;
            border-radius: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            overflow: hidden;
            box-sizing: border-box;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
        }

        /* İzin ve Başlangıç Ekranı Overlayer */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }
    </style>
</head>
<body>

    <div id="score-board">Skor: <span id="score">0</span></div>

    <canvas id="gameCanvas" width="360" height="360"></canvas>

    <div id="options-container">
        <div class="option-card" id="opt0" data-index="0"></div>
        <div class="option-card" id="opt1" data-index="1"></div>
        <div class="option-card" id="opt2" data-index="2"></div>
    </div>

    <div id="start-overlay">
        <h2>Jiroskop Eşleştirme Oyunu</h2>
        <p>Oyunu oynamak için telefonunuzu eğmeniz gerekir. Lütfen jiroskop izni verin ve cihazı dik tutun.</p>
        <button id="start-btn">OYUNA BAŞLA</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const startOverlay = document.getElementById('start-overlay');
        const startBtn = document.getElementById('start-btn');

        // Renk Havuzu
        const colors = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33F3', '#33FFF0'];

        // Oyun Durumu (State)
        let score = 0;
        let targetColors = []; // Üstteki karenin 4 rengi [sol-üst, sağ-üst, sol-alt, sağ-alt]
        let optionsData = [];  // 3 seçeneğin renk kombinasyonları
        let correctOptionIndex = 0;

        // İmleç (Cursor) Fizikleri
        let cursor = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 12,
            vx: 0,
            vy: 0,
            speedMultiplier: 0.6, // Jiroskop hassasiyeti
            friction: 0.92        // Akıcılık (Sürtünme)
        };

        // Zamanlayıcı Kontrolleri (1 saniye kalma mekaniği)
        let hoveredOptionIndex = -1;
        let hoverStartTime = null;
        const requiredHoverTime = 1000; // 1 saniye (ms)

        // Alt seçeneklerin Canvas üzerindeki sanal izdüşüm koordinatları
        // İmleç canvas içinde kalacağı için seçenekleri canvas'ın en altına hayali olarak yerleştiriyoruz.
        // Canvas alt alanı (y: 260'tan sonrası) seçenek algılama bölgesi olacak.
        const optionZones = [
            { id: 0, xStart: 10,  xEnd: 110, yStart: 260, yEnd: 350 },
            { id: 1, xStart: 130, xEnd: 230, yStart: 260, yEnd: 350 },
            { id: 2, xStart: 250, xEnd: 350, yStart: 260, yEnd: 350 }
        ];

        // 1. Oyunu Başlatma ve İzin İşlemleri
        startBtn.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS cihazlar için izin mekanizması
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        initGame();
                    } else {
                        alert('Jiroskop izni reddedildi. Oyun oynanamaz.');
                    }
                } catch (error) {
                    console.error(error);
                }
            } else {
                // Android veya iOS olmayan cihazlar
                initGame();
            }
        });

        function initGame() {
            startOverlay.style.display = 'none';
            window.addEventListener('deviceorientation', handleOrientation);
            generateNewRound();
            requestAnimationFrame(gameLoop);
        }

        // 2. Jiroskop Verisini Yakalama
        function handleOrientation(event) {
            // beta: Ön-arka eğim (-180, 180) -> Y ekseni
            // gamma: Sağ-sol eğim (-90, 90) -> X ekseni
            let tiltX = event.gamma; 
            let tiltY = event.beta - 45; // Cihazı genelde 45 derece dik tutulduğu varsayımıyla kalibre ediyoruz

            // Hassasiyet sınırlandırması
            cursor.vx += tiltX * cursor.speedMultiplier * 0.1;
            cursor.vy += tiltY * cursor.speedMultiplier * 0.1;
        }

        // 3. Yeni Bölüm Oluşturma (Renk Kombinasyonları)
        function getRandomColors() {
            // Rastgele 4 renk seçer
            let roundColors = [];
            for(let i=0; i<4; i++) {
                roundColors.push(colors[Math.floor(Math.random() * colors.length)]);
            }
            return roundColors;
        }

        function generateNewRound() {
            // Hedef kareyi oluştur
            targetColors = getRandomColors();
            correctOptionIndex = Math.floor(Math.random() * 3);
            optionsData = [];

            // 3 Seçeneği doldur
            for (let i = 0; i < 3; i++) {
                if (i === correctOptionIndex) {
                    optionsData.push([...targetColors]); // Doğru şık
                } else {
                    let wrongColors = getRandomColors();
                    // Yanlış şıkkın aynısı gelmesin diye küçük bir kontrol
                    while(JSON.stringify(wrongColors) === JSON.stringify(targetColors)) {
                        wrongColors = getRandomColors();
                    }
                    optionsData.push(wrongColors);
                }
            }

            // Alt kısımdaki HTML DOM kartlarını boya
            for (let i = 0; i < 3; i++) {
                const card = document.getElementById(`opt${i}`);
                card.innerHTML = ''; // temizle
                card.style.borderColor = '#444'; // Seçim çizgisini sıfırla
                
                optionsData[i].forEach(color => {
                    const div = document.createElement('div');
                    div.style.backgroundColor = color;
                    card.appendChild(div);
                });
            }

            // İmleci Canvas'ın ortasına sıfırla
            cursor.x = canvas.width / 2;
            cursor.y = 100; // Üst kareye yakın başlasın
            cursor.vx = 0;
            cursor.vy = 0;
            hoveredOptionIndex = -1;
            hoverStartTime = null;
        }

        // 4. Çarpışma Testi (İmleç Alttaki Seçeneklerin Üzerinde mi?)
        function checkCollision() {
            let insideAnyZone = false;

            for (let zone of optionZones) {
                if (cursor.x >= zone.xStart && cursor.x <= zone.xEnd &&
                    cursor.y >= zone.yStart && cursor.y <= zone.yEnd) {
                    
                    insideAnyZone = true;

                    if (hoveredOptionIndex !== zone.id) {
                        // Yeni bir seçeneğin üzerine gelindi
                        hoveredOptionIndex = zone.id;
                        hoverStartTime = Date.now();
                    } else {
                        // Zaten bu seçeneğin üzerindeydi, süreyi kontrol et
                        let elapsed = Date.now() - hoverStartTime;
                        
                        // Görsel efekt olarak kartın çerçevesini yeşile doğru boyayalım (Feedback)
                        document.getElementById(`opt${zone.id}`).style.borderColor = '#f1c40f';

                        if (elapsed >= requiredHoverTime) {
                            // 1 saniye doldu! Seçimi kontrol et.
                            processSelection(zone.id);
                        }
                    }
                    break;
                }
            }

            if (!insideAnyZone) {
                // Eğer hiçbir seçeneğin üzerinde değilse timer'ları temizle
                if (hoveredOptionIndex !== -1) {
                    document.getElementById(`opt${hoveredOptionIndex}`).style.borderColor = '#444';
                }
                hoveredOptionIndex = -1;
                hoverStartTime = null;
            }
        }

        // 5. Seçim Doğrulama Mantığı
        function processSelection(selectedIndex) {
            if (selectedIndex === correctOptionIndex) {
                score++;
                scoreEl.innerText = score;
                // Doğru bildi efekti
                document.getElementById(`opt${selectedIndex}`).style.borderColor = '#2ecc71';
            } else {
                // Yanlış bildi efekti
                document.getElementById(`opt${selectedIndex}`).style.borderColor = '#e74c3c';
                if(score > 0) score--;
                scoreEl.innerText = score;
            }

            // Kısa bir gecikmeyle yeni tura geç
            setTimeout(() => {
                generateNewRound();
            }, 300);
        }

        // 6. Ana Oyun Döngüsü (Render & Update)
        function gameLoop() {
            // Fizik Güncellemeleri (Hız ve Sürtünme)
            cursor.vx *= cursor.friction;
            cursor.vy *= cursor.friction;
            cursor.x += cursor.vx;
            cursor.y += cursor.vy;

            // Ekran Sınırları Kontrolü (Canvas dışına taşmasın)
            if (cursor.x - cursor.radius < 0) { cursor.x = cursor.radius; cursor.vx = 0; }
            if (cursor.x + cursor.radius > canvas.width) { cursor.x = canvas.width - cursor.radius; cursor.vx = 0; }
            if (cursor.y - cursor.radius < 0) { cursor.y = cursor.radius; cursor.vy = 0; }
            if (cursor.y + cursor.radius > canvas.height) { cursor.y = canvas.height - cursor.radius; cursor.vy = 0; }

            // Çarpışma Kontrolü
            checkCollision();

            // --- ÇİZİM AŞAMASI ---
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Üstteki Büyük Kareyi Çiz (4 Eşit Parça)
            const size = 180;
            const startX = (canvas.width - size) / 2;
            const startY = 20;

            if (targetColors.length === 4) {
                // Sol Üst
                ctx.fillStyle = targetColors[0];
                ctx.fillRect(startX, startY, size/2, size/2);
                // Sağ Üst
                ctx.fillStyle = targetColors[1];
                ctx.fillRect(startX + size/2, startY, size/2, size/2);
                // Sol Alt
                ctx.fillStyle = targetColors[2];
                ctx.fillRect(startX, startY + size/2, size/2, size/2);
                // Sağ Alt
                ctx.fillStyle = targetColors[3];
                ctx.fillRect(startX + size/2, startY + size/2, size/2, size/2);
            }

            // Ortadaki Ayırıcı Artı (+) Çizgisi
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(startX + size/2, startY);
            ctx.lineTo(startX + size/2, startY + size);
            ctx.moveTo(startX, startY + size/2);
            ctx.lineTo(startX + size, startY + size/2);
            ctx.stroke();

            // 2. Sanal Hedef Alan Çizgileri (Geliştirici/Oyuncu için Canvas üzerindeki buton alanları rehberi)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            optionZones.forEach(zone => {
                ctx.strokeRect(zone.xStart, zone.yStart, zone.xEnd - zone.xStart, zone.yEnd - zone.yStart);
            });

            // 3. İmleci (Cursor) Çiz
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ffffff';
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(cursor.x, cursor.y, cursor.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Gölge efektini sonraki çizimler için sıfırla
            ctx.shadowBlur = 0;

            // 4. Hover Yüklenme Halkası (1 sn kalma efektini imleç etrafında gösterelim)
            if (hoveredOptionIndex !== -1 && hoverStartTime !== null) {
                let elapsed = Date.now() - hoverStartTime;
                let angle = (elapsed / requiredHoverTime) * Math.PI * 2;
                
                ctx.strokeStyle = '#f1c40f';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(cursor.x, cursor.y, cursor.radius + 6, -Math.PI/2, (-Math.PI/2) + angle);
                ctx.stroke();
            }

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
