<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Jiroskop Yatay Renk Oyunu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
        }

        /* Tüm Ekranı ve Kareleri Çevreleyen Sınır */
        #game-boundary {
            position: relative;
            width: 95vw;
            height: 90vh;
            border: 5px solid #34495e;
            border-radius: 20px;
            background-color: #222;
            display: flex;
            flex-direction: row; /* Sol ve Sağ düzeni */
            align-items: center;
            justify-content: space-around;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Sol Bölüm: Skor ve Referans Kare Alanı */
        #left-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 40%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        #score-board {
            font-size: 22px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 15px;
        }

        /* Sağ Bölüm: Seçenekler Alanı */
        #options-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 55%;
            height: 100%;
            z-index: 2;
            pointer-events: auto;
            transition: opacity 0.3s ease;
        }

        /* 2 saniyelik bekleme esnasında gizleme sınıfı */
        .hidden-options {
            opacity: 0.1;
            pointer-events: none !important;
        }

        /* Seçenek Kartları (Yarı yarıya küçültüldü) */
        .option-card {
            width: 75px;
            height: 75px;
            border: 3px solid #444;
            border-radius: 8px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            overflow: hidden;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        /* Arka Plandaki Canvas */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Başlangıç Ekranı Overlayer */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }
    </style>
</head>
<body>

    <div id="game-boundary">
        
        <canvas id="gameCanvas"></canvas>

        <div id="left-panel">
            <div id="score-board">Skor: <span id="score">0</span></div>
            <div style="width: 180px; height: 180px;"></div> 
        </div>

        <div id="options-container">
            <div class="option-card" id="opt0"></div>
            <div class="option-card" id="opt1"></div>
            <div class="option-card" id="opt2"></div>
        </div>

    </div>

    <div id="start-overlay">
        <h2>Jiroskop Yatay Renk Oyunu</h2>
        <p>Lütfen telefonunuzu YATAY (Landscape) konuma getirin, tepsi gibi düz tutun ve oyunu başlatın.</p>
        <button id="start-btn">OYUNA BAŞLA</button>
    </div>

    <script>
        const boundary = document.getElementById('game-boundary');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const optionsContainer = document.getElementById('options-container');
        const startOverlay = document.getElementById('start-overlay');
        const startBtn = document.getElementById('start-btn');

        // Canvas boyutlarını sınır kutusuna göre eşitle
        function resizeCanvas() {
            canvas.width = boundary.clientWidth;
            canvas.height = boundary.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const colors = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33F3', '#33FFF0'];

        let score = 0;
        let targetColors = [];
        let optionsData = [];
        let correctOptionIndex = 0;
        let isWaitingForOptions = false; // 2 saniyelik bekleme kontrolü

        // İmleç Fizikleri (Hız yarıya düşürüldü)
        let cursor = {
            x: 0,
            y: 0,
            radius: 10,
            vx: 0,
            vy: 0,
            speedMultiplier: 0.3, // 0.6'dan 0.3'e çekilerek hassasiyet azaltıldı
            friction: 0.94        
        };

        let hoveredOptionIndex = -1;
        let hoverStartTime = null;
        const requiredHoverTime = 1000; 

        startBtn.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        initGame();
                    } else {
                        alert('Jiroskop izni reddedildi.');
                    }
                } catch (error) {
                    console.error(error);
                }
            } else {
                initGame();
            }
        });

        function initGame() {
            startOverlay.style.display = 'none';
            window.addEventListener('deviceorientation', handleOrientation);
            
            // Başlangıçta imleci tam ortaya koy
            cursor.x = canvas.width / 2;
            cursor.y = canvas.height / 2;

            generateNewRound(true); // İlk el seçenekler hemen gelsin
            requestAnimationFrame(gameLoop);
        }

        function handleOrientation(event) {
            // Yatay modda telefon sola yatırıldığında beta X, gamma Y ekseni gibi davranır
            // Cihazın dönüş yönüne göre yönleri optimize ediyoruz
            let tiltX = event.beta; 
            let tiltY = -event.gamma; 

            cursor.vx += tiltX * cursor.speedMultiplier * 0.1;
            cursor.vy += tiltY * cursor.speedMultiplier * 0.1;
        }

        function getRandomColors() {
            let roundColors = [];
            for(let i=0; i<4; i++) {
                roundColors.push(colors[Math.floor(Math.random() * colors.length)]);
            }
            return roundColors;
        }

        function generateNewRound(immediateOptions = false) {
            targetColors = getRandomColors();
            correctOptionIndex = Math.floor(Math.random() * 3);
            optionsData = [];

            for (let i = 0; i < 3; i++) {
                if (i === correctOptionIndex) {
                    optionsData.push([...targetColors]);
                } else {
                    let wrongColors = getRandomColors();
                    while(JSON.stringify(wrongColors) === JSON.stringify(targetColors)) {
                        wrongColors = getRandomColors();
                    }
                    optionsData.push(wrongColors);
                }
            }

            // Seçeneklerin DOM içeriklerini hazırla
            for (let i = 0; i < 3; i++) {
                const card = document.getElementById(`opt${i}`);
                card.innerHTML = '';
                card.style.borderColor = '#444';
                
                optionsData[i].forEach(color => {
                    const div = document.createElement('div');
                    div.style.backgroundColor = color;
                    card.appendChild(div);
                });
            }

            hoveredOptionIndex = -1;
            hoverStartTime = null;

            if (immediateOptions) {
                isWaitingForOptions = false;
                optionsContainer.classList.remove('hidden-options');
            } else {
                // Seçenekleri gizle ve 2 saniye sonra göster
                isWaitingForOptions = true;
                optionsContainer.classList.add('hidden-options');
                setTimeout(() => {
                    isWaitingForOptions = false;
                    optionsContainer.classList.remove('hidden-options');
                }, 2000); // 2 saniye gecikme
            }
        }

        function checkCollision() {
            if (isWaitingForOptions) return; // Seçenekler gizliyken algılama yapma

            let insideAnyZone = false;
            // boundary kutusunun sol-üst köşesini referans alarak gerçek pozisyon hesaplama
            const boundaryRect = boundary.getBoundingClientRect();

            for (let i = 0; i < 3; i++) {
                const card = document.getElementById(`opt${i}`);
                const rect = card.getBoundingClientRect();

                // Kartın koordinatlarını canvas düzlemine indirgiyoruz
                const relativeLeft = rect.left - boundaryRect.left;
                const relativeRight = rect.right - boundaryRect.left;
                const relativeTop = rect.top - boundaryRect.top;
                const relativeBottom = rect.bottom - boundaryRect.top;

                if (cursor.x >= relativeLeft && cursor.x <= relativeRight &&
                    cursor.y >= relativeTop && cursor.y <= relativeBottom) {
                    
                    insideAnyZone = true;

                    if (hoveredOptionIndex !== i) {
                        hoveredOptionIndex = i;
                        hoverStartTime = Date.now();
                    } else {
                        let elapsed = Date.now() - hoverStartTime;
                        card.style.borderColor = '#f1c40f';

                        if (elapsed >= requiredHoverTime) {
                            processSelection(i);
                        }
                    }
                    break;
                }
            }

            if (!insideAnyZone) {
                if (hoveredOptionIndex !== -1) {
                    document.getElementById(`opt${hoveredOptionIndex}`).style.borderColor = '#444';
                }
                hoveredOptionIndex = -1;
                hoverStartTime = null;
            }
        }

        function processSelection(selectedIndex) {
            if (selectedIndex === correctOptionIndex) {
                score++;
                scoreEl.innerText = score;
                document.getElementById(`opt${selectedIndex}`).style.borderColor = '#2ecc71';
            } else {
                document.getElementById(`opt${selectedIndex}`).style.borderColor = '#e74c3c';
                if(score > 0) score--;
                scoreEl.innerText = score;
            }

            // Yeni tura geç ama seçenekleri geciktir
            setTimeout(() => {
                generateNewRound(false);
            }, 300);
        }

        function gameLoop() {
            cursor.vx *= cursor.friction;
            cursor.vy *= cursor.friction;
            cursor.x += cursor.vx;
            cursor.y += cursor.vy;

            // KRİTİK GÜNCELLEME: İmleç artık kesinlikle dış sınırdan (canvas sınırından) dışarı çıkamaz
            if (cursor.x - cursor.radius < 0) { cursor.x = cursor.radius; cursor.vx = 0; }
            if (cursor.x + cursor.radius > canvas.width) { cursor.x = canvas.width - cursor.radius; cursor.vx = 0; }
            if (cursor.y - cursor.radius < 0) { cursor.y = cursor.radius; cursor.vy = 0; }
            if (cursor.y + cursor.radius > canvas.height) { cursor.y = canvas.height - cursor.radius; cursor.vy = 0; }

            checkCollision();

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Sol taraftaki panelin merkezine referans kareyi çiziyoruz
            const size = 180;
            const leftPanelEl = document.getElementById('left-panel');
            const leftPanelRect = leftPanelEl.getBoundingClientRect();
            const boundaryRect = boundary.getBoundingClientRect();

            // Referans karenin x ve y'sini sol panel merkezine göre hesapla
            const startX = (leftPanelRect.left - boundaryRect.left) + (leftPanelRect.width - size) / 2;
            const startY = (leftPanelRect.top - boundaryRect.top) + (leftPanelRect.height - size) / 2 + 20;

            if (targetColors.length === 4) {
                ctx.fillStyle = targetColors[0];
                ctx.fillRect(startX, startY, size/2, size/2);
                ctx.fillStyle = targetColors[1];
                ctx.fillRect(startX + size/2, startY, size/2, size/2);
                ctx.fillStyle = targetColors[2];
                ctx.fillRect(startX, startY + size/2, size/2, size/2);
                ctx.fillStyle = targetColors[3];
                ctx.fillRect(startX + size/2, startY + size/2, size/2, size/2);
            }

            // Ortadaki Artı Çizgisi
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(startX + size/2, startY);
            ctx.lineTo(startX + size/2, startY + size);
            ctx.moveTo(startX, startY + size/2);
            ctx.lineTo(startX + size, startY + size/2);
            ctx.stroke();

            // İmleci Çiz
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ffffff';
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(cursor.x, cursor.y, cursor.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Hover Efekti (Halka)
            if (hoveredOptionIndex !== -1 && hoverStartTime !== null && !isWaitingForOptions) {
                let elapsed = Date.now() - hoverStartTime;
                let angle = (elapsed / requiredHoverTime) * Math.PI * 2;
                
                ctx.strokeStyle = '#f1c40f';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(cursor.x, cursor.y, cursor.radius + 6, -Math.PI/2, (-Math.PI/2) + angle);
                ctx.stroke();
            }

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
