<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR Oyun - Adım 2 (Kesin Çözüm)</title>
    <style>
        /* Tüm ekranı kaplayan temel temizlik */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #2C3E50; font-family: sans-serif; }

        /* Başlatma Ekranı */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; color: white; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #start-btn {
            padding: 15px 30px; font-size: 18px; background: #27ae60;
            color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 15px;
        }

        /* VR Box için Ekranı İkiye Bölme (Sol ve Sağ Göz) */
        .vr-mode { display: flex; width: 100%; height: 100%; }
        .eye-screen {
            position: relative; width: 50%; height: 100%;
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; justify-content: space-around; align-items: center;
            padding: 40px 0;
        }

        /* VR Box Ortasındaki Bakış İmleci (Crosshair) */
        .cursor {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; background: white;
            border-radius: 50%; transform: translate(-50%, -50%);
            z-index: 100; pointer-events: none; box-shadow: 0 0 5px #000;
            transition: transform 1s linear;
        }
        /* Bakarken küçülme efekti */
        .cursor.fusing { transform: translate(-50%, -50%) scale(0.2); background: #ff3333; }

        /* Oyun Alanı Tasarımı (Karelerin Kutusu) */
        .matrix-container {
            display: grid; grid-template-columns: repeat(2, 1fr);
            width: 140px; height: 140px; background: #222; padding: 5px; gap: 5px;
            border-radius: 8px; transition: background 0.3s;
        }
        .small-square { border-radius: 3px; }

        /* Referans Kare (Yukarıdaki) */
        .reference-box { transform: scale(1.1); border: 3px solid #fff; }

        /* Seçenekler Grubu (Aşağıdaki 3 adet) */
        .options-group { display: flex; gap: 15px; justify-content: center; width: 100%; }
        .option-box { transform: scale(0.8); cursor: pointer; }

        /* Renk Tanımlamaları */
        .c-red { background: #FF0000; }
        .c-green { background: #00FF00; }
        .c-yellow { background: #FFFF00; }
        .c-blue { background: #0000FF; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2>VR Renk Oyunu - Adım 2</h2>
        <p>Kareleri görmek ve oyunu başlatmak için tıklayın.</p>
        <button id="start-btn">OYUNU BAŞLAT</button>
    </div>

    <div class="vr-mode">
        
        <div class="eye-screen" id="left-eye">
            <div class="cursor" id="cursor-left"></div>
            
            <div class="matrix-container reference-box">
                <div class="small-square c-red"></div>
                <div class="small-square c-green"></div>
                <div class="small-square c-yellow"></div>
                <div class="small-square c-blue"></div>
            </div>

            <div class="options-group">
                <div class="matrix-container option-box" data-index="0">
                    <div class="small-square c-green"></div><div class="small-square c-red"></div>
                    <div class="small-square c-blue"></div><div class="small-square c-yellow"></div>
                </div>
                <div class="matrix-container option-box" data-index="1">
                    <div class="small-square c-red"></div><div class="small-square c-green"></div>
                    <div class="small-square c-yellow"></div><div class="small-square c-blue"></div>
                </div>
                <div class="matrix-container option-box" data-index="2">
                    <div class="small-square c-yellow"></div><div class="small-square c-blue"></div>
                    <div class="small-square c-red"></div><div class="small-square c-green"></div>
                </div>
            </div>
        </div>

        <div class="eye-screen" id="right-eye">
            <div class="cursor" id="cursor-right"></div>
            
            <div class="matrix-container reference-box">
                <div class="small-square c-red"></div>
                <div class="small-square c-green"></div>
                <div class="small-square c-yellow"></div>
                <div class="small-square c-blue"></div>
            </div>

            <div class="options-group">
                <div class="matrix-container option-box" data-index="0">
                    <div class="small-square c-green"></div><div class="small-square c-red"></div>
                    <div class="small-square c-blue"></div><div class="small-square c-yellow"></div>
                </div>
                <div class="matrix-container option-box" data-index="1">
                    <div class="small-square c-red"></div><div class="small-square c-green"></div>
                    <div class="small-square c-yellow"></div><div class="small-square c-blue"></div>
                </div>
                <div class="matrix-container option-box" data-index="2">
                    <div class="small-square c-yellow"></div><div class="small-square c-blue"></div>
                    <div class="small-square c-red"></div><div class="small-square c-green"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        let fuseTimer = null;
        const leftCursor = document.getElementById('cursor-left');
        const rightCursor = document.getElementById('cursor-right');

        document.getElementById('start-btn').addEventListener('click', function() {
            document.getElementById('start-screen').style.display = 'none';
            // Telefon yatay çevrildiğinde tam ekran yapmak için (opsiyonel)
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
            setupGazeEvents();
        });

        function setupGazeEvents() {
            // Aşağıdaki 3 seçeneği buluyoruz (Hem sol hem sağ gözdekileri eşzamanlı yöneteceğiz)
            const optionBoxes = document.querySelectorAll('.option-box');

            optionBoxes.forEach(box => {
                // VR Box'ta kafayı çevirip imleci kutunun üzerine getirdiğimiz an (Mouseenter mobilde bakış simülasyonudur)
                box.addEventListener('mouseenter', function() {
                    const targetIndex = this.getAttribute('data-index');
                    
                    // İmleçlerin küçülme animasyonunu başlat (1 saniye sürecek)
                    leftCursor.classList.add('fusing');
                    rightCursor.classList.add('fusing');

                    // 1 saniye (1000ms) boyunca odaklanılırsa seçimi gerçekleştir
                    fuseTimer = setTimeout(() => {
                        // Seçilen kutunun arka planını BEYAZ yap (Hem sol hem sağ ekranda)
                        const identicalBoxes = document.querySelectorAll(`.option-box[data-index="${targetIndex}"]`);
                        identicalBoxes.forEach(b => b.style.backgroundColor = '#FFFFFF');
                        
                        resetCursors();
                    }, 1000);
                });

                // Kafayı kutudan başka yere çevirirse işlemi iptal et
                box.addEventListener('mouseleave', function() {
                    clearTimeout(fuseTimer);
                    resetCursors();
                });
            });
        }

        function resetCursors() {
            leftCursor.classList.remove('fusing');
            rightCursor.classList.remove('fusing');
        }
    </script>
</body>
</html>
