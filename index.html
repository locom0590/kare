<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jiroskop Renk Eşleştirme Oyunu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
            height: 100vh;
            width: 100vw;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            pointer-events: none;
            z-index: 2;
        }

        #score-board {
            font-size: 24px;
            font-weight: bold;
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            pointer-events: auto;
        }

        /* Seçenekler Alanı (Yarı yarıya küçültüldü) */
        #options-container {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 300px; /* Genişlik daraltıldı */
            margin-bottom: 20px;
            padding: 0 10px;
            box-sizing: border-box;
            pointer-events: auto;
            transition: opacity 0.2s ease-in-out;
        }

        .option-card {
            width: 24%; /* Kartlar küçültüldü */
            aspect-ratio: 1;
            border: 3px solid #444;
            border-radius: 6px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            overflow: hidden;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="score-board">Skor: <span id="score">0</span></div>
        
        <div id="options-container">
            <div class="option-card" id="opt0"></div>
            <div class="option-card" id="opt1"></div>
            <div class="option-card" id="opt2"></div>
        </div>
    </div>

    <div id="start-overlay">
        <h2>Jiroskop Eşleştirme Oyunu</h2>
        <p>Oyunu oynamak için telefonunuzu YATAY ve tepsi gibi düz tutun. Lütfen jiroskop izni verin.</p>
        <button id="start-btn">OYUNA BAŞLA</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const startOverlay = document.getElementById('start-overlay');
        const startBtn = document.getElementById('start-btn');
        const optionsContainer = document.getElementById('options-container');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const colors = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33F3', '#33FFF0'];

        let score = 0;
        let targetColors = [];
        let optionsData = [];
        let correctOptionIndex = 0;
        let isWaitingNewRound = false;

        // Üst Kare Sınır Tanımlamaları (180x180)
        const size = 180;
        let bounds = { startX: 0, startY: 80, endX: 0, endY: 260 };

        // İmleç Fizikleri (Hız yarıya düşürüldü: 0.7 -> 0.35)
        let cursor = {
            x: 0,
            y: 0,
            radius: 8,
            vx: 0,
            vy: 0,
            speedMultiplier: 0.35, 
            friction: 0.90        
        };

        let hoveredOptionIndex = -1;
        let hoverStartTime = null;
        const requiredHoverTime = 1000; 

        startBtn.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        initGame();
                    } else {
                        alert('Jiroskop izni reddedildi.');
                    }
                } catch (error) {
                    console.error(error);
                }
            } else {
                initGame();
            }
        });

        function initGame() {
            startOverlay.style.display = 'none';
            window.addEventListener('deviceorientation', handleOrientation);
            
            // Dinamik sınırları ekran genişliğine göre merkezle
            bounds.startX = (canvas.width - size) / 2;
            bounds.endX = bounds.startX + size;
            
            cursor.x = bounds.startX + size / 2;
            cursor.y = bounds.startY + size / 2;

            generateNewRound(true);
            requestAnimationFrame(gameLoop);
        }

        // Yatay tutuş moduna göre jiroskop eksenleri
        function handleOrientation(event) {
            let tiltX = event.beta;  
            let tiltY = -event.gamma; 

            cursor.vx += tiltX * cursor.speedMultiplier * 0.1;
            cursor.vy += tiltY * cursor.speedMultiplier * 0.1;
        }

        function getRandomColors() {
            let roundColors = [];
            for(let i=0; i<4; i++) {
                roundColors.push(colors[Math.floor(Math.random() * colors.length)]);
            }
            return roundColors;
        }

        function generateNewRound(isFirstRound = false) {
            targetColors = getRandomColors();
            correctOptionIndex = Math.floor(Math.random() * 3);
            optionsData = [];

            for (let i = 0; i < 3; i++) {
                if (i === correctOptionIndex) {
                    optionsData.push([...targetColors]);
                } else {
                    let wrongColors = getRandomColors();
                    while(JSON.stringify(wrongColors) === JSON.stringify(targetColors)) {
                        wrongColors = getRandomColors();
                    }
                    optionsData.push(wrongColors);
                }
            }

            for (let i = 0; i < 3; i++) {
                const card = document.getElementById(`opt${i}`);
                card.innerHTML = '';
                card.style.borderColor = '#444';
                
                optionsData[i].forEach(color => {
                    const div = document.createElement('div');
                    div.style.backgroundColor = color;
                    card.appendChild(div);
                });
            }

            cursor.x = bounds.startX + size / 2;
            cursor.y = bounds.startY + size / 2;
            cursor.vx = 0;
            cursor.vy = 0;
            hoveredOptionIndex = -1;
            hoverStartTime = null;

            if (!isFirstRound) {
                // Seçenekleri gizle ve 2 saniye sonra göster
                optionsContainer.style.opacity = '0';
                optionsContainer.style.pointerEvents = 'none';
                isWaitingNewRound = true;

                setTimeout(() => {
                    optionsContainer.style.opacity = '1';
                    optionsContainer.style.pointerEvents = 'auto';
                    isWaitingNewRound = false;
                }, 2000);
            }
        }

        // Çarpışma Testi (Üst kare içi bölgelere göre seçim tespiti)
        function checkCollision() {
            if (isWaitingNewRound) return;

            let insideAnyZone = false;
            let currentZone = -1;

            // İmlecin üst kare içindeki çeyrek dilim pozisyonuna göre seçenek eşleşmesi
            let midX = bounds.startX + size / 2;

            if (cursor.y >= bounds.startY && cursor.y <= bounds.endY) {
                if (cursor.x >= bounds.startX && cursor.x < midX - 20) {
                    currentZone = 0; // Sol Alan -> Seçenek 1
                } else if (cursor.x >= midX - 20 && cursor.x <= midX + 20) {
                    currentZone = 1; // Orta Alan -> Seçenek 2
                } else if (cursor.x > midX + 20 && cursor.x <= bounds.endX) {
                    currentZone = 2; // Sağ Alan -> Seçenek 3
                }
            }

            if (currentZone !== -1) {
                insideAnyZone = true;

                if (hoveredOptionIndex !== currentZone) {
                    if (hoveredOptionIndex !== -1) {
                        document.getElementById(`opt${hoveredOptionIndex}`).style.borderColor = '#444';
                    }
                    hoveredOptionIndex = currentZone;
                    hoverStartTime = Date.now();
                } else {
                    let elapsed = Date.now() - hoverStartTime;
                    document.getElementById(`opt${currentZone}`).style.borderColor = '#f1c40f';

                    if (elapsed >= requiredHoverTime) {
                        processSelection(currentZone);
                    }
                }
            }

            if (!insideAnyZone) {
                if (hoveredOptionIndex !== -1) {
                    document.getElementById(`opt${hoveredOptionIndex}`).style.borderColor = '#444';
                }
                hoveredOptionIndex = -1;
                hoverStartTime = null;
            }
        }

        function processSelection(selectedIndex) {
            if (selectedIndex === correctOptionIndex) {
                score++;
                scoreEl.innerText = score;
                document.getElementById(`opt${selectedIndex}`).style.borderColor = '#2ecc71';
            } else {
                document.getElementById(`opt${selectedIndex}`).style.borderColor = '#e74c3c';
                if(score > 0) score--;
                scoreEl.innerText = score;
            }

            setTimeout(() => {
                generateNewRound();
            }, 300);
        }

        function gameLoop() {
            bounds.startX = (canvas.width - size) / 2;
            bounds.endX = bounds.startX + size;

            cursor.vx *= cursor.friction;
            cursor.vy *= cursor.friction;
            cursor.x += cursor.vx;
            cursor.y += cursor.vy;

            // Kesin Sınır Algoritması: İmleç üst kare sınırlarının dışına çıkamaz
            if (cursor.x - cursor.radius < bounds.startX) { cursor.x = bounds.startX + cursor.radius; cursor.vx = 0; }
            if (cursor.x + cursor.radius > bounds.endX) { cursor.x = bounds.endX - cursor.radius; cursor.vx = 0; }
            if (cursor.y - cursor.radius < bounds.startY) { cursor.y = bounds.startY + cursor.radius; cursor.vy = 0; }
            if (cursor.y + cursor.radius > bounds.endY) { cursor.y = bounds.endY - cursor.radius; cursor.vy = 0; }

            checkCollision();

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Bütün 4 kareyi çevreleyen dış sınır çizgisi
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 4;
            ctx.strokeRect(bounds.startX, bounds.startY, size, size);

            if (targetColors.length === 4) {
                ctx.fillStyle = targetColors[0];
                ctx.fillRect(bounds.startX, bounds.startY, size/2, size/2);
                ctx.fillStyle = targetColors[1];
                ctx.fillRect(bounds.startX + size/2, bounds.startY, size/2, size/2);
                ctx.fillStyle = targetColors[2];
                ctx.fillRect(bounds.startX, bounds.startY + size/2, size/2, size/2);
                ctx.fillStyle = targetColors[3];
                ctx.fillRect(bounds.startX + size/2, bounds.startY + size/2, size/2, size/2);
            }

            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(bounds.startX + size/2, bounds.startY);
            ctx.lineTo(bounds.startX + size/2, bounds.startY + size);
            ctx.moveTo(bounds.startX, bounds.startY + size/2);
            ctx.lineTo(bounds.startX + size, bounds.startY + size/2);
            ctx.stroke();

            // İmleç Çizimi
            ctx.shadowBlur = 6;
            ctx.shadowColor = '#ffffff';
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(cursor.x, cursor.y, cursor.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Seçim İlerleme Halkası
            if (hoveredOptionIndex !== -1 && hoverStartTime !== null && !isWaitingNewRound) {
                let elapsed = Date.now() - hoverStartTime;
                let angle = (elapsed / requiredHoverTime) * Math.PI * 2;
                
                ctx.strokeStyle = '#f1c40f';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(cursor.x, cursor.y, cursor.radius + 5, -Math.PI/2, (-Math.PI/2) + angle);
                ctx.stroke();
            }

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
