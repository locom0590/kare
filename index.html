<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR Oyun - Adım 2: Sabitlenmiş Takip</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #1a252f; font-family: sans-serif; }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; color: white; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; text-align: center;
        }
        #start-btn {
            padding: 15px 30px; font-size: 18px; background: #27ae60;
            color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px;
            font-weight: bold;
        }

        .vr-mode { display: flex; width: 100%; height: 100%; }
        .eye-screen {
            position: relative; width: 50%; height: 100%;
            border-right: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .camera-world {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-around; align-items: center;
            padding: 40px 0;
            transform-origin: center center;
            will-change: transform;
        }

        .cursor {
            position: absolute; top: 50%; left: 50%;
            width: 14px; height: 14px; background: transparent;
            border: 3px solid white;
            border-radius: 50%; transform: translate(-50%, -50%);
            z-index: 100; pointer-events: none; box-shadow: 0 0 6px #000;
            will-change: transform;
        }
        .cursor.fusing { background: #e74c3c; border-color: #e74c3c; transform: translate(-50%, -50%) scale(0.5); }

        .matrix-container {
            display: grid; grid-template-columns: repeat(2, 1fr);
            width: 120px; height: 120px; background: #222; padding: 5px; gap: 5px;
            border-radius: 8px; transition: background 0.3s;
        }
        .small-square { border-radius: 3px; }
        .reference-box { transform: scale(1.1); border: 3px solid #fff; }
        
        .options-group { display: flex; gap: 15px; justify-content: center; width: 100%; }
        .option-box { transform: scale(0.85); }

        .c-red { background: #FF0000; }
        .c-green { background: #00FF00; }
        .c-yellow { background: #FFFF00; }
        .c-blue { background: #0000FF; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2>VR Sarsıntı Filtreli Takip</h2>
        <p>Atlamaları ve yön hatalarını düzelten kararlı sürüm için başlatın.</p>
        <button id="start-btn">BAŞLAT</button>
    </div>

    <div class="vr-mode">
        <div class="eye-screen">
            <div class="cursor" id="cursor-left"></div>
            <div class="camera-world" id="world-left">
                <div class="matrix-container reference-box">
                    <div class="small-square c-red"></div><div class="small-square c-green"></div>
                    <div class="small-square c-yellow"></div><div class="small-square c-blue"></div>
                </div>
                <div class="options-group">
                    <div class="matrix-container option-box" data-index="0">
                        <div class="small-square c-green"></div><div class="small-square c-red"></div>
                        <div class="small-square c-blue"></div><div class="small-square c-yellow"></div>
                    </div>
                    <div class="matrix-container option-box" data-index="1">
                        <div class="small-square c-red"></div><div class="small-square c-green"></div>
                        <div class="small-square c-yellow"></div><div class="small-square c-blue"></div>
                    </div>
                    <div class="matrix-container option-box" data-index="2">
                        <div class="small-square c-yellow"></div><div class="small-square c-blue"></div>
                        <div class="small-square c-red"></div><div class="small-square c-green"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="eye-screen">
            <div class="cursor" id="cursor-right"></div>
            <div class="camera-world" id="world-right">
                <div class="matrix-container reference-box">
                    <div class="small-square c-red"></div><div class="small-square c-green"></div>
                    <div class="small-square c-yellow"></div><div class="small-square c-blue"></div>
                </div>
                <div class="options-group">
                    <div class="matrix-container option-box" data-index="0">
                        <div class="small-square c-green"></div><div class="small-square c-red"></div>
                        <div class="small-square c-blue"></div><div class="small-square c-yellow"></div>
                    </div>
                    <div class="matrix-container option-box" data-index="1">
                        <div class="small-square c-red"></div><div class="small-square c-green"></div>
                        <div class="small-square c-yellow"></div><div class="small-square c-blue"></div>
                    </div>
                    <div class="matrix-container option-box" data-index="2">
                        <div class="small-square c-yellow"></div><div class="small-square c-blue"></div>
                        <div class="small-square c-red"></div><div class="small-square c-green"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let fuseTimer = null;
        let isFusing = false;
        let currentTargetIndex = null;
        
        let initialBeta = null;
        let initialGamma = null;

        // Yumuşatma (Filtreleme) için mevcut ve hedef konum kayıtları
        let currentX = 0, currentY = 0;
        let targetX = 0, targetY = 0;
        const lerpFactor = 0.15; // Değer küçüldükçe hareket yumuşar ve sıçramalar yok olur (0.15 ideal)

        const leftCursor = document.getElementById('cursor-left');
        const rightCursor = document.getElementById('cursor-right');
        const worldLeft = document.getElementById('world-left');
        const worldRight = document.getElementById('world-right');

        document.getElementById('start-btn').addEventListener('click', async function() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') { initVR(); }
                } catch (error) { console.error(error); }
            } else { initVR(); }
        });

        function initVR() {
            document.getElementById('start-screen').style.display = 'none';
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
            window.addEventListener('deviceorientation', handleOrientation, true);
            
            // Ekran yenileme hızına (60fps) senkronize animasyon döngüsü (Sıçramaları engeller)
            function updateLoop() {
                // Low-pass filtre / Lerp formülü ile hedefe yumuşak geçiş
                currentX += (targetX - currentX) * lerpFactor;
                currentY += (targetY - currentY) * lerpFactor;

                // Maksimum ekran dışına kaçma sınırı koyduk (Kareler asla tamamen gözden kaybolamaz)
                const maxLimitX = window.innerHeight * 0.35;
                const maxLimitY = window.innerWidth * 0.20;
                
                const clampedX = Math.max(-maxLimitX, Math.min(maxLimitX, currentX));
                const clampedY = Math.max(-maxLimitY, Math.min(maxLimitY, currentY));

                // Doğru yönlendirilmiş eksen atamaları
                leftCursor.style.transform = `translate(calc(-50% + ${clampedY}px), calc(-50% + ${clampedX}px))`;
                rightCursor.style.transform = `translate(calc(-50% + ${clampedY}px), calc(-50% + ${clampedX}px))`;

                const worldTransform = `translate(${clampedY * 0.6}px, ${clampedX * 0.6}px)`;
                worldLeft.style.transform = worldTransform;
                worldRight.style.transform = worldTransform;

                checkGazeCollision();
                requestAnimationFrame(updateLoop);
            }
            requestAnimationFrame(updateLoop);
        }

        function handleOrientation(event) {
            if (initialBeta === null && event.beta !== null) {
                initialBeta = event.beta;
                initialGamma = event.gamma;
            }

            // VR Box yatay pozisyonunda eksen yönlerinin doğrulanması
            if (window.orientation === 90) {
                targetX = (event.beta - initialBeta) * 5.5;
                targetY = (event.gamma - initialGamma) * 5.5;
            } else if (window.orientation === -90) {
                targetX = -(event.beta - initialBeta) * 5.5;
                targetY = -(event.gamma - initialGamma) * 5.5;
            } else {
                targetX = (event.gamma - initialGamma) * 5.5;
                targetY = (event.beta - initialBeta) * 5.5;
            }
        }

        function checkGazeCollision() {
            const optionBoxes = worldLeft.querySelectorAll('.option-box');
            let hitDetected = false;

            const cursorRect = leftCursor.getBoundingClientRect();
            const cx = cursorRect.left + (cursorRect.width / 2);
            const cy = cursorRect.top + (cursorRect.height / 2);

            optionBoxes.forEach(box => {
                const rect = box.getBoundingClientRect();
                if (cx >= rect.left && cx <= rect.right && cy >= rect.top && cy <= rect.bottom) {
                    hitDetected = true;
                    const index = box.getAttribute('data-index');
                    if (!isFusing || currentTargetIndex !== index) { startFusing(index); }
                }
            });

            if (!hitDetected && isFusing) { cancelFusing(); }
        }

        function startFusing(index) {
            isFusing = true;
            currentTargetIndex = index;
            leftCursor.classList.add('fusing');
            rightCursor.classList.add('fusing');

            fuseTimer = setTimeout(() => {
                const allMatches = document.querySelectorAll(`.option-box[data-index="${currentTargetIndex}"]`);
                allMatches.forEach(b => b.style.backgroundColor = '#FFFFFF');
                cancelFusing();
            }, 1000);
        }

        function cancelFusing() {
            clearTimeout(fuseTimer);
            isFusing = false;
            currentTargetIndex = null;
            leftCursor.classList.remove('fusing');
            rightCursor.classList.remove('fusing');
        }
    </script>
</body>
</html>
