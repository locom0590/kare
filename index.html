<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR Oyun - Adım 2: Jiroskop Entegrasyonu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #1a252f; font-family: sans-serif; }

        /* Başlatma ve İzin Ekranı */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; color: white; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; text-align: center;
        }
        #start-btn {
            padding: 15px 30px; font-size: 18px; background: #27ae60;
            color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px;
            font-weight: bold;
        }

        /* VR Çerçevesi */
        .vr-mode { display: flex; width: 100%; height: 100%; }
        .eye-screen {
            position: relative; width: 50%; height: 100%;
            border-right: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        /* Kamera Kontteyneri: Jiroskop ile bu alanı döndüreceğiz */
        .camera-world {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-around; align-items: center;
            padding: 40px 0;
            transform-origin: center center;
            will-change: transform;
        }

        /* VR Sabit İmleç (Ekrana yapışıktır, dünya dönse de tam ortada kalır) */
        .cursor {
            position: absolute; top: 50%; left: 50%;
            width: 12px; height: 12px; background: white;
            border-radius: 50%; transform: translate(-50%, -50%);
            z-index: 100; pointer-events: none; box-shadow: 0 0 6px #000;
            transition: transform 1s linear, background-color 0.2s;
        }
        .cursor.fusing { transform: translate(-50%, -50%) scale(0.3); background: #e74c3c; }

        /* Oyun Nesneleri */
        .matrix-container {
            display: grid; grid-template-columns: repeat(2, 1fr);
            width: 130px; height: 130px; background: #222; padding: 5px; gap: 5px;
            border-radius: 8px; transition: background 0.3s;
        }
        .small-square { border-radius: 3px; }
        .reference-box { transform: scale(1.1); border: 3px solid #fff; }
        
        .options-group { display: flex; gap: 20px; justify-content: center; width: 100%; }
        .option-box { transform: scale(0.85); }

        /* Renkler */
        .c-red { background: #FF0000; }
        .c-green { background: #00FF00; }
        .c-yellow { background: #FFFF00; }
        .c-blue { background: #0000FF; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2>VR Hareket Testi</h2>
        <p>Kafanızı çevirdiğinizde oyunun algılaması için hareket sensörü (jiroskop) izni vermeniz gerekmektedir.</p>
        <button id="start-btn">İZİN VER VE BAŞLAT</button>
    </div>

    <div class="vr-mode">
        
        <div class="eye-screen">
            <div class="cursor" id="cursor-left"></div>
            <div class="camera-world" id="world-left">
                <div class="matrix-container reference-box">
                    <div class="small-square c-red"></div><div class="small-square c-green"></div>
                    <div class="small-square c-yellow"></div><div class="small-square c-blue"></div>
                </div>
                <div class="options-group">
                    <div class="matrix-container option-box" data-index="0">
                        <div class="small-square c-green"></div><div class="small-square c-red"></div>
                        <div class="small-square c-blue"></div><div class="small-square c-yellow"></div>
                    </div>
                    <div class="matrix-container option-box" data-index="1">
                        <div class="small-square c-red"></div><div class="small-square c-green"></div>
                        <div class="small-square c-yellow"></div><div class="small-square c-blue"></div>
                    </div>
                    <div class="matrix-container option-box" data-index="2">
                        <div class="small-square c-yellow"></div><div class="small-square c-blue"></div>
                        <div class="small-square c-red"></div><div class="small-square c-green"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="eye-screen">
            <div class="cursor" id="cursor-right"></div>
            <div class="camera-world" id="world-right">
                <div class="matrix-container reference-box">
                    <div class="small-square c-red"></div><div class="small-square c-green"></div>
                    <div class="small-square c-yellow"></div><div class="small-square c-blue"></div>
                </div>
                <div class="options-group">
                    <div class="matrix-container option-box" data-index="0">
                        <div class="small-square c-green"></div><div class="small-square c-red"></div>
                        <div class="small-square c-blue"></div><div class="small-square c-yellow"></div>
                    </div>
                    <div class="matrix-container option-box" data-index="1">
                        <div class="small-square c-red"></div><div class="small-square c-green"></div>
                        <div class="small-square c-yellow"></div><div class="small-square c-blue"></div>
                    </div>
                    <div class="matrix-container option-box" data-index="2">
                        <div class="small-square c-yellow"></div><div class="small-square c-blue"></div>
                        <div class="small-square c-red"></div><div class="small-square c-green"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        let fuseTimer = null;
        let isFusing = false;
        let currentTargetIndex = null;
        
        const leftCursor = document.getElementById('cursor-left');
        const rightCursor = document.getElementById('cursor-right');
        const worldLeft = document.getElementById('world-left');
        const worldRight = document.getElementById('world-right');

        document.getElementById('start-btn').addEventListener('click', async function() {
            // iOS için Jiroskop İzin İsteme Mekanizması
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        initVR();
                    } else {
                        alert('Jiroskop izni reddedildi. Oyun kafa hareketiyle oynanamaz.');
                    }
                } catch (error) {
                    console.error(error);
                }
            } else {
                // Android veya izin istemeyen düz tarayıcılar direkt başlar
                initVR();
            }
        });

        function initVR() {
            document.getElementById('start-screen').style.display = 'none';
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
            
            // Jiroskop Dinleyicisini Başlat
            window.addEventListener('deviceorientation', handleOrientation, true);
            
            // Döngüsel olarak imlecin hangi kutunun üstünde olduğunu kontrol eden motor
            setInterval(checkGazeCollision, 100);
        }

        // Kafayı sağa sola (gamma) veya yukarı aşağı (beta) oynattıkça dünyayı ters yöne kaydırırız
        function handleOrientation(event) {
            // Telefonun yatay tutulduğunu varsayıyoruz (VR Box modu)
            // Cihaz eksenlerine göre kafa takibi simülasyonu
            let xMove = 0;
            let yMove = 0;

            if (window.orientation === 90) {
                xMove = -event.beta * 4;
                yMove = -event.gamma * 4;
            } else if (window.orientation === -90) {
                xMove = event.beta * 4;
                yMove = event.gamma * 4;
            } else {
                // Telefon dikse düzgün çalışması için yatay çevrilmesini isteyeceğiz ama şimdilik standart eşitleme:
                xMove = event.gamma * 4;
                yMove = event.beta * 4;
            }

            // Dünyayı (kareleri) hareket ettirerek kameranın döndüğü hissini yaratıyoruz
            const transformStyle = `translate(${xMove}px, ${yMove}px)`;
            worldLeft.style.transform = transformStyle;
            worldRight.style.transform = transformStyle;
        }

        // İmleç tam ekranın ortasında sabit durduğu için, hangi kutunun ekranın ortasına denk geldiğini hesaplayan fonksiyon
        function checkGazeCollision() {
            // Sadece sol göz ekranı üzerinden kontrol etmemiz yeterli (iki göz de simetrik)
            const optionBoxes = worldLeft.querySelectorAll('.option-box');
            let hitDetected = false;

            // Ekranın tam ortasının koordinatları (Sol gözün merkezi)
            const centerX = window.innerWidth / 4;
            const centerY = window.innerHeight / 2;

            optionBoxes.forEach(box => {
                const rect = box.getBoundingClientRect();
                
                // Eğer ekranın tam ortası bu kutunun sınırları içindeyse (Bakış isabet ettiyse)
                if (centerX >= rect.left && centerX <= rect.right && centerY >= rect.top && centerY <= rect.bottom) {
                    hitDetected = true;
                    const index = box.getAttribute('data-index');

                    if (!isFusing || currentTargetIndex !== index) {
                        startFusing(index);
                    }
                }
            });

            // Eğer hiçbir kutuya bakılmıyorsa imleci sıfırla
            if (!hitDetected && isFusing) {
                cancelFusing();
            }
        }

        function startFusing(index) {
            isFusing = true;
            currentTargetIndex = index;
            leftCursor.classList.add('fusing');
            rightCursor.classList.add('fusing');

            // 1 saniye (1000ms) boyunca bakış sürerse tetikle
            fuseTimer = setTimeout(() => {
                const allMatches = document.querySelectorAll(`.option-box[data-index="${currentTargetIndex}"]`);
                allMatches.forEach(b => b.style.backgroundColor = '#FFFFFF'); // İsabet eden kutuyu beyaza boya
                cancelFusing();
            }, 1000);
        }

        function cancelFusing() {
            clearTimeout(fuseTimer);
            isFusing = false;
            currentTargetIndex = null;
            leftCursor.classList.remove('fusing');
            rightCursor.classList.remove('fusing');
        }
    </script>
</body>
</html>
