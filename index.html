<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Jiroskop Yatay Seviyeli Renk Oyunu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
        }

        /* Tüm Ekranı ve Kareleri Çevreleyen Sınır */
        #game-boundary {
            position: relative;
            width: 95vw;
            height: 90vh;
            border: 5px solid #34495e;
            border-radius: 20px;
            background-color: #222;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Sol Bölüm: Skor ve Referans Kare Alanı */
        #left-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 35%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        #score-board {
            font-size: 22px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 15px;
        }

        /* Sağ Bölüm: Seçenekler Alanı (Köşe Düzeni İçin Grid Yapıldı) */
        #options-container {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Sol ve Sağ sütunlar */
            grid-template-rows: 1fr 1fr;    /* Üst ve Alt satırlar */
            gap: 40px;
            justify-items: center;
            align-items: center;
            width: 60%;
            height: 80%;
            z-index: 2;
            pointer-events: auto;
            transition: opacity 0.3s ease;
        }

        .hidden-options {
            opacity: 0.1;
            pointer-events: none !important;
        }

        /* Seçenek Kartları (75x75 boyutu korundu) */
        .option-card {
            width: 75px;
            height: 75px;
            border: 3px solid #444;
            border-radius: 8px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            overflow: hidden;
            box-sizing: border-box;
            transition: border-color 0.2s;
            position: relative;
        }

        /* Seçeneklerin içindeki siyah artı (+) çizgileri */
        .option-card::before {
            content: "";
            position: absolute;
            top: 0; left: 50%;
            width: 3px; height: 100%;
            background-color: #1a1a1a;
            transform: translateX(-50%);
            z-index: 1;
        }
        .option-card::after {
            content: "";
            position: absolute;
            top: 50%; left: 0;
            width: 100%; height: 3px;
            background-color: #1a1a1a;
            transform: translateY(-50%);
            z-index: 1;
        }

        .option-card div {
            width: 100%;
            height: 100%;
        }

        /* Arka Plandaki Canvas */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Başlangıç Ekranı ve Seviye Seçimi */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .level-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .lvl-btn {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .lvl-btn:active { transform: scale(0.95); }
        #lvl1 { background-color: #2ecc71; box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3); }
        #lvl2 { background-color: #f1c40f; box-shadow: 0 4px 10px rgba(241, 196, 15, 0.3); color: #222; }
        #lvl4 { background-color: #e74c3c; box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3); }
    </style>
</head>
<body>

    <div id="game-boundary">
        <canvas id="gameCanvas"></canvas>

        <div id="left-panel">
            <div id="score-board">Skor: <span id="score">0</span></div>
            <div style="width: 180px; height: 180px;"></div> 
        </div>

        <div id="options-container">
            <div class="option-card" id="opt0"></div> <div class="option-card" id="opt1"></div> <div class="option-card" id="opt2"></div> <div class="option-card" id="opt3"></div> </div>
    </div>

    <div id="start-overlay">
        <h2>Jiroskop Köşe Eşleştirme Oyunu</h2>
        <p>Telefonunuzu YATAY konuma getirip düz tutun ve oynamak istediğiniz seviyeyi seçin:</p>
        <div class="level-buttons">
            <button class="lvl-btn" id="lvl1">SEVİYE 1 (2 Renk)</button>
            <button class="lvl-btn" id="lvl2">SEVİYE 2 (3 Renk)</button>
            <button class="lvl-btn" id="lvl4">SEVİYE 4 (5 Renk)</button>
        </div>
    </div>

    <script>
        const boundary = document.getElementById('game-boundary');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const optionsContainer = document.getElementById('options-container');
        const startOverlay = document.getElementById('start-overlay');

        function resizeCanvas() {
            canvas.width = boundary.clientWidth;
            canvas.height = boundary.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Tüm ana renk havuzu
        const allColors = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33F3', '#33FFF0', '#FFA500', '#800080'];
        let activeColors = []; // Seçilen seviyeye göre filtrelenecek renkler

        let score = 0;
        let targetColors = [];
        let optionsData = [];
        let correctOptionIndex = 0;
        let isWaitingForOptions = false;

        let cursor = {
            x: 0, y: 0, radius: 10, vx: 0, vy: 0,
            speedMultiplier: 0.1, 
            friction: 0.94        
        };

        let hoveredOptionIndex = -1;
        let hoverStartTime = null;
        const requiredHoverTime = 1000; 

        // Seviye Buton Dinleyicileri
        document.getElementById('lvl1').addEventListener('click', () => startWithLevel(2));
        document.getElementById('lvl2').addEventListener('click', () => startWithLevel(3));
        document.getElementById('lvl4').addEventListener('click', () => startWithLevel(5));

        async function startWithLevel(colorCount) {
            // Aktif renk havuzunu seviyeye göre kısıtla
            activeColors = allColors.slice(0, colorCount);

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        initGame();
                    } else {
                        alert('Jiroskop izni reddedildi.');
                    }
                } catch (error) {
                    console.error(error);
                }
            } else {
                initGame();
            }
        }

        function initGame() {
            startOverlay.style.display = 'none';
            window.addEventListener('deviceorientation', handleOrientation);
            
            cursor.x = canvas.width / 2;
            cursor.y = canvas.height / 2;

            generateNewRound(true); 
            requestAnimationFrame(gameLoop);
        }

        function handleOrientation(event) {
            let tiltX = event.beta; 
            let tiltY = -event.gamma; 

            cursor.vx += tiltX * cursor.speedMultiplier * 0.1;
            cursor.vy += tiltY * cursor.speedMultiplier * 0.1;
        }

        function getRandomColors() {
            let roundColors = [];
            for(let i=0; i<4; i++) {
                roundColors.push(activeColors[Math.floor(Math.random() * activeColors.length)]);
            }
            return roundColors;
        }

        function generateNewRound(immediateOptions = false) {
            targetColors = getRandomColors();
            correctOptionIndex = Math.floor(Math.random() * 4); // Artık 4 seçenek var
            optionsData = [];

            for (let i = 0; i < 4; i++) {
                if (i === correctOptionIndex) {
                    optionsData.push([...targetColors]);
                } else {
                    let wrongColors = getRandomColors();
                    while(JSON.stringify(wrongColors) === JSON.stringify(targetColors)) {
                        wrongColors = getRandomColors();
                    }
                    optionsData.push(wrongColors);
                }
            }

            for (let i = 0; i < 4; i++) {
                const card = document.getElementById(`opt${i}`);
                card.innerHTML = '';
                card.style.borderColor = '#444';
                
                optionsData[i].forEach(color => {
                    const div = document.createElement('div');
                    div.style.backgroundColor = color;
                    card.appendChild(div);
                });
            }

            hoveredOptionIndex = -1;
            hoverStartTime = null;

            if (immediateOptions) {
                isWaitingForOptions = false;
                optionsContainer.classList.remove('hidden-options');
            } else {
                isWaitingForOptions = true;
                optionsContainer.classList.add('hidden-options');
                setTimeout(() => {
                    isWaitingForOptions = false;
                    optionsContainer.classList.remove('hidden-options');
                }, 6000); 
            }
        }

        function checkCollision() {
            if (isWaitingForOptions) return; 

            let insideAnyZone = false;
            const boundaryRect = boundary.getBoundingClientRect();

            for (let i = 0; i < 4; i++) {
                const card = document.getElementById(`opt${i}`);
                const rect = card.getBoundingClientRect();

                const relativeLeft = rect.left - boundaryRect.left;
                const relativeRight = rect.right - boundaryRect.left;
                const relativeTop = rect.top - boundaryRect.top;
                const relativeBottom = rect.bottom - boundaryRect.top;

                if (cursor.x >= relativeLeft && cursor.x <= relativeRight &&
                    cursor.y >= relativeTop && cursor.y <= relativeBottom) {
                    
                    insideAnyZone = true;

                    if (hoveredOptionIndex !== i) {
                        hoveredOptionIndex = i;
                        hoverStartTime = Date.now();
                    } else {
                        let elapsed = Date.now() - hoverStartTime;
                        card.style.borderColor = '#f1c40f';

                        if (elapsed >= requiredHoverTime) {
                            processSelection(i);
                        }
                    }
                    break;
                }
            }

            if (!insideAnyZone) {
                if (hoveredOptionIndex !== -1) {
                    document.getElementById(`opt${hoveredOptionIndex}`).style.borderColor = '#444';
                }
                hoveredOptionIndex = -1;
                hoverStartTime = null;
            }
        }

        function processSelection(selectedIndex) {
            if (selectedIndex === correctOptionIndex) {
                score++;
                scoreEl.innerText = score;
                document.getElementById(`opt${selectedIndex}`).style.borderColor = '#2ecc71';
            } else {
                document.getElementById(`opt${selectedIndex}`).style.borderColor = '#e74c3c';
                if(score > 0) score--;
                scoreEl.innerText = score;
            }

            setTimeout(() => {
                generateNewRound(false);
            }, 300);
        }

        function gameLoop() {
            cursor.vx *= cursor.friction;
            cursor.vy *= cursor.friction;
            cursor.x += cursor.vx;
            cursor.y += cursor.vy;

            if (cursor.x - cursor.radius < 0) { cursor.x = cursor.radius; cursor.vx = 0; }
            if (cursor.x + cursor.radius > canvas.width) { cursor.x = canvas.width - cursor.radius; cursor.vx = 0; }
            if (cursor.y - cursor.radius < 0) { cursor.y = cursor.radius; cursor.vy = 0; }
            if (cursor.y + cursor.radius > canvas.height) { cursor.y = canvas.height - cursor.radius; cursor.vy = 0; }

            checkCollision();

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const size = 180;
            const leftPanelEl = document.getElementById('left-panel');
            const leftPanelRect = leftPanelEl.getBoundingClientRect();
            const boundaryRect = boundary.getBoundingClientRect();

            const startX = (leftPanelRect.left - boundaryRect.left) + (leftPanelRect.width - size) / 2;
            const startY = (leftPanelRect.top - boundaryRect.top) + (leftPanelRect.height - size) / 2 + 20;

            if (targetColors.length === 4) {
                ctx.fillStyle = targetColors[0];
                ctx.fillRect(startX, startY, size/2, size/2);
                ctx.fillStyle = targetColors[1];
                ctx.fillRect(startX + size/2, startY, size/2, size/2);
                ctx.fillStyle = targetColors[2];
                ctx.fillRect(startX, startY + size/2, size/2, size/2);
                ctx.fillStyle = targetColors[3];
                ctx.fillRect(startX + size/2, startY + size/2, size/2, size/2);
            }

            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(startX + size/2, startY);
            ctx.lineTo(startX + size/2, startY + size);
            ctx.moveTo(startX, startY + size/2);
            ctx.lineTo(startX + size, startY + size/2);
            ctx.stroke();

            // İmleci Çiz
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ffffff';
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(cursor.x, cursor.y, cursor.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Hover Efekti (Halka)
            if (hoveredOptionIndex !== -1 && hoverStartTime !== null && !isWaitingForOptions) {
                let elapsed = Date.now() - hoverStartTime;
                let angle = (elapsed / requiredHoverTime) * Math.PI * 2;
                
                ctx.strokeStyle = '#f1c40f';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(cursor.x, cursor.y, cursor.radius + 6, -Math.PI/2, (-Math.PI/2) + angle);
                ctx.stroke();
            }

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
