<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Renk Eslesme Oyunu</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        /* Başlangıçta seslerin aktifleşmesi için gereken buton */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: Arial, sans-serif;
        }
        #start-btn {
            padding: 15px 30px;
            font-size: 20px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        .vr-info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: Arial, sans-serif;
            z-index: 10;
            pointer-events: none;
            text-shadow: 2px 2px 4px #000;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h2>VR Renk Eşleştirme Oyunu</h2>
        <p>Telefonu VR Box'a yerleştirmeden önce aşağıdaki butona basın.</p>
        <button id="start-btn">OYUNU BAŞLAT</button>
    </div>

    <div class="vr-info" id="levelDisplay">Seviye: 1</div>

    <a-scene>
        <a-assets>
            <audio id="sound-correct" src="https://cdn.jsdelivr.net/gh/nicolas-van/component-sound-fx@master/audio/correct.mp3" preload="auto"></audio>
            <audio id="sound-wrong" src="https://cdn.jsdelivr.net/gh/nicolas-van/component-sound-fx@master/audio/error.mp3" preload="auto"></audio>
        </a-assets>

        <a-entity camera look-controls position="0 1.6 0">
            <a-cursor id="cursor"
                animation__fusing="property: scale; startEvents: fusing; easing: easeInCasing; dur: 1000; from: 1 1 1; to: 0.1 0.1 0.1"
                animation__mouseleave="property: scale; startEvents: mouseleave; easing: easeInCasing; dur: 150; to: 1 1 1"
                raycaster="objects: .clickable"
                fuse="true" 
                fuse-timeout="1000"> </a-cursor>
        </a-entity>

        <a-entity id="reference-panel" position="0 2.4 -3" scale="0.7 0.7 0.7">
            <a-plane width="2.2" height="2.2" color="#222"></a-plane>
            <a-plane id="ref-0" width="0.9" height="0.9" position="-0.5  0.5 0.01"></a-plane>
            <a-plane id="ref-1" width="0.9" height="0.9" position=" 0.5  0.5 0.01"></a-plane>
            <a-plane id="ref-2" width="0.9" height="0.9" position="-0.5 -0.5 0.01"></a-plane>
            <a-plane id="ref-3" width="0.9" height="0.9" position=" 0.5 -0.5 0.01"></a-plane>
        </a-entity>

        <a-entity id="option-0" class="clickable" position="-1.6 0.8 -3" scale="0.5 0.5 0.5">
            <a-plane width="2.2" height="2.2" color="#111"></a-plane>
            <a-plane id="opt-0-0" width="0.9" height="0.9" position="-0.5  0.5 0.01"></a-plane>
            <a-plane id="opt-0-1" width="0.9" height="0.9" position=" 0.5  0.5 0.01"></a-plane>
            <a-plane id="opt-0-2" width="0.9" height="0.9" position="-0.5 -0.5 0.01"></a-plane>
            <a-plane id="opt-0-3" width="0.9" height="0.9" position=" 0.5 -0.5 0.01"></a-plane>
            <a-sphere id="feedback-0" radius="0.3" position="0 0 0.2" visible="false"></a-sphere>
        </a-entity>

        <a-entity id="option-1" class="clickable" position="0 0.8 -3" scale="0.5 0.5 0.5">
            <a-plane width="2.2" height="2.2" color="#111"></a-plane>
            <a-plane id="opt-1-0" width="0.9" height="0.9" position="-0.5  0.5 0.01"></a-plane>
            <a-plane id="opt-1-1" width="0.9" height="0.9" position=" 0.5  0.5 0.01"></a-plane>
            <a-plane id="opt-1-2" width="0.9" height="0.9" position="-0.5 -0.5 0.01"></a-plane>
            <a-plane id="opt-1-3" width="0.9" height="0.9" position=" 0.5 -0.5 0.01"></a-plane>
            <a-sphere id="feedback-1" radius="0.3" position="0 0 0.2" visible="false"></a-sphere>
        </a-entity>

        <a-entity id="option-2" class="clickable" position="1.6 0.8 -3" scale="0.5 0.5 0.5">
            <a-plane width="2.2" height="2.2" color="#111"></a-plane>
            <a-plane id="opt-2-0" width="0.9" height="0.9" position="-0.5  0.5 0.01"></a-plane>
            <a-plane id="opt-2-1" width="0.9" height="0.9" position=" 0.5  0.5 0.01"></a-plane>
            <a-plane id="opt-2-2" width="0.9" height="0.9" position="-0.5 -0.5 0.01"></a-plane>
            <a-plane id="opt-2-3" width="0.9" height="0.9" position=" 0.5 -0.5 0.01"></a-plane>
            <a-sphere id="feedback-2" radius="0.3" position="0 0 0.2" visible="false"></a-sphere>
        </a-entity>

        <a-sky color="#2C3E50"></a-sky>
        <a-plane position="0 0 0" rotation="-90 0 0" width="50" height="50" color="#34495E"></a-plane>
    </a-scene>

    <script>
        let currentLevel = 1;
        const colorPalette = ['#FF0000', '#00FF00', '#FFFF00', '#0000FF']; // Kırmızı, Yeşil, Sarı, Mavi
        let currentColors = [];
        let correctOptionIndex = 0;
        let isWaitingNextLevel = false;

        // İstediğin Seviye kuralları tam olarak burada işleniyor:
        function getAvailableColors(level) {
            if (level <= 5) {
                return [colorPalette[0], colorPalette[1]]; // 1-5 Seviye: Sadece Kırmızı ve Yeşil
            } else if (level <= 10) {
                return [colorPalette[0], colorPalette[1], colorPalette[2]]; // 6-10 Seviye: + Sarı
            } else {
                return [colorPalette[0], colorPalette[1], colorPalette[2], colorPalette[3]]; // 11+ Seviye: + Mavi
            }
        }

        function generateRandomPattern(colorsPool) {
            let pattern = [];
            for(let i=0; i<4; i++) {
                const randomIndex = Math.floor(Math.random() * colorsPool.length);
                pattern.push(colorsPool[randomIndex]);
            }
            return pattern;
        }

        function arraysEqual(a, b) {
            return a.every((val, index) => val === b[index]);
        }

        function initLevel() {
            isWaitingNextLevel = false;
            document.getElementById('levelDisplay').innerText = "Seviye: " + currentLevel;

            const pool = getAvailableColors(currentLevel);
            currentColors = generateRandomPattern(pool);
            
            // Referansı boya
            for(let i=0; i<4; i++) {
                document.getElementById(`ref-${i}`).setAttribute('color', currentColors[i]);
            }

            correctOptionIndex = Math.floor(Math.random() * 3);

            // Seçenekleri boya ve eski işaretleri temizle
            for(let opt=0; opt<3; opt++) {
                const feedbackEl = document.getElementById(`feedback-${opt}`);
                feedbackEl.setAttribute('visible', 'false');

                let optPattern;
                if(opt === correctOptionIndex) {
                    optPattern = [...currentColors];
                } else {
                    do {
                        optPattern = generateRandomPattern(pool);
                    } while (arraysEqual(optPattern, currentColors));
                }

                for(let i=0; i<4; i++) {
                    document.getElementById(`opt-${opt}-${i}`).setAttribute('color', optPattern[i]);
                }
            }
        }

        function setupEventListeners() {
            for(let opt=0; opt<3; opt++) {
                const optionEl = document.getElementById(`option-${opt}`);
                const feedbackEl = document.getElementById(`feedback-${opt}`);

                optionEl.addEventListener('click', function() {
                    if(isWaitingNextLevel) return;

                    if(opt === correctOptionIndex) {
                        // DOĞRU SEÇENEK: Yeşil Küre çıkıyor ve "Oldu" sesi çalıyor
                        isWaitingNextLevel = true;
                        feedbackEl.setAttribute('color', '#00FF00');
                        feedbackEl.setAttribute('visible', 'true');
                        
                        document.getElementById('sound-correct').components.sound.playSound();

                        // 1.5 saniye sonra sonraki seviyeye geçiş ve döngü tekrarı
                        setTimeout(() => {
                            currentLevel++;
                            initLevel();
                        }, 1500);

                    } else {
                        // YANLIŞ SEÇENEK: Kırmızı Küre çıkıyor ve Hata sesi çalıyor
                        feedbackEl.setAttribute('color', '#FF0000');
                        feedbackEl.setAttribute('visible', 'true');
                        
                        document.getElementById('sound-wrong').components.sound.playSound();
                    }
                });
            }
        }

        // Mobil Tarayıcı Ses Kilidini Açma Mekanizması
        document.getElementById('start-btn').addEventListener('click', function() {
            document.getElementById('start-overlay').style.display = 'none';
            
            // Ses bileşenlerini yükle ve ilk oynatmayı tetikle (boş ses)
            const sCorrect = document.getElementById('sound-correct');
            const sWrong = document.getElementById('sound-wrong');
            sCorrect.setAttribute('sound', 'src: #sound-correct; volume: 1');
            sWrong.setAttribute('sound', 'src: #sound-wrong; volume: 1');
            
            // Tarayıcıya ses izni verilmiş oldu, oyunu başlatıyoruz
            initLevel();
            setupEventListeners();
        });
    </script>
</body>
</html>
